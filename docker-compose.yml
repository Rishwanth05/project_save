version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: save_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: project_save
      POSTGRES_USER: save_user
      POSTGRES_PASSWORD: save_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: save_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: save_backend
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: save_user
      DB_PASS: save_password
      DB_NAME: project_save
      REDIS_URL: redis://redis:6379
      JWT_SECRET: changemeinproduction
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data: