<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project SAVE - Report Hazard</title>

  <link rel="stylesheet" href="report-modern.css" />

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>

<body>
  <div id="reportPage">
    <div class="report-wrap">
      <h1 class="report-title">Report Hazard</h1>

      <div class="report-card">
        <form id="reportForm" class="form-grid">

          <div class="field">
            <label for="hazard_type">Hazard Type</label>
            <select id="hazard_type" required>
              <option value="" disabled selected>Select hazard type</option>
              <option value="Pothole">Pothole</option>
              <option value="Water Logging">Water Logging</option>
              <option value="Exposed Wire">Exposed Wire</option>
              <option value="Risk of fire">Risk of fire</option>
              <option value="Garbage Dump">Garbage Dump</option>
              <option value="Road Damage">Road Damage</option>
              <option value="Open manhole">Open manhole</option>
              <option value="Under construction">Under construction</option>
              <option value="Others">Others</option>
            </select>
          </div>

          <div class="field">
            <label for="severity">Severity</label>
            <select id="severity" required>
              <option value="" disabled selected>Select severity</option>
              <option value="high">High</option>
              <option value="medium">Medium</option>
              <option value="low">Low</option>
            </select>
          </div>

          <div class="field">
            <div class="map-head">
              <label for="map" style="margin:0;">Location (Drop a pin)</label>

              <button type="button" id="gpsBtn" class="gps-btn">
                Auto-access Location (GPS)
              </button>

              <span id="pinText" class="pin-text">No pin selected</span>
            </div>

            <div id="map"></div>
            <div class="helper">Tip: Click anywhere on the map to drop/move the pin.</div>
          </div>

          <div class="field">
            <label for="description">Description</label>
            <textarea id="description" placeholder="Explain the issue..." required></textarea>
          </div>

          <div class="field">
            <label for="photo">Upload Photo</label>
            <input id="photo" type="file" accept="image/*" />
            <div class="helper">PNG/JPG recommended.</div>
          </div>

          <button class="submit-btn" type="submit">Submit Report</button>

          <a class="back-link" href="dashboard.html">Back to Dashboard</a>

          <div id="msg" class="msg"></div>
        </form>
      </div>
    </div>
  </div>

  <!-- Leaflet JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- Existing JS -->
  <script src="report.js"></script>

  <!-- ✅ Severity color logic (does NOT break features) -->
  <script>
    (function () {
      const severity = document.getElementById("severity");
      if (!severity) return;

      function applySeverityClass() {
        severity.classList.remove("sev-high", "sev-medium", "sev-low");
        const v = (severity.value || "").toLowerCase();
        if (v === "high") severity.classList.add("sev-high");
        else if (v === "medium") severity.classList.add("sev-medium");
        else if (v === "low") severity.classList.add("sev-low");
      }

      severity.addEventListener("change", applySeverityClass);
      applySeverityClass();
    })();
  </script>
</body>
</html>
