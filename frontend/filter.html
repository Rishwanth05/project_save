<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>View Reports Filter</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
</head>
<body>
  <div class="page">
    <div class="wrap">
      <h1 class="title">View Reports</h1>

      <div class="card grid">
        <div>
          <label>Select center location (drop a pin)</label>
          <div class="row">
            <button type="button" class="btn btn-outline" id="gpsBtn">Auto-access Location (GPS)</button>
            <div id="pinStatus">No pin selected</div>
          </div>
          <div id="map"></div>
          <div class="small-note">Click on the map to choose the center point for filtering.</div>
        </div>

        <div>
          <label>Select Radius (0–100 miles)</label>
          <div class="radiusBox">
            <input id="radius" type="range" min="0" max="100" value="20" />
            <div class="radiusValue"><span id="radiusVal">20</span> mi</div>
          </div>
        </div>

        <div class="center-actions">
          <button class="btn btn-blue" id="viewBtn">View</button>
          <a class="btn btn-outline" href="dashboard.html">Back to Dashboard</a>
        </div>

        <div id="msg" class="msg"></div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="filter.js"></script>
</body>
</html>
