<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Project SAVE – Signup</title>

  
  <link rel="stylesheet" href="./auth-modern.css" />
</head>

<body>
  <div class="auth-wrap">
    <!-- LEFT HERO -->
    <section class="auth-hero">
      <div class="hero-overlay"></div>

      <div class="hero-content">
        <div class="brand">
          <img src="./assets/logo.svg.svg" class="brand-logo" alt="Project SAVE" />
          <span class="brand-name">Project SAVE</span>
        </div>

        <h1>Report hazards.<br/>Make cities safer.</h1>
        <p>Create an account to submit incidents and track status updates.</p>

        <div class="hero-dots">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot active"></span>
        </div>
      </div>
    </section>

    <!-- RIGHT PANEL -->
    <section class="auth-panel">
      <div class="panel-inner">
        <h2>Create an account</h2>
        <p class="sub">Already have an account? <a href="login.html">Log in</a></p>

        <!-- ✅ SAME FORM ID so signup.js works -->
        <form id="signupForm" class="form">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="Full Name" required />

          <label for="email">Email</label>
          <input type="email" id="email" placeholder="Email Address" required />

          <label for="password">Password</label>
          <div class="password-field">
            <input type="password" id="password" placeholder="Password" required />
            <button type="button" class="eye" id="togglePassword" aria-label="Show password">👁</button>
          </div>

          <button type="submit" class="btn-primary">Create Account</button>

          <!-- ✅ SAME MSG ID so signup.js works -->
          <p id="msg" class="msg"></p>
        </form>

        <div class="divider"><span>Or register with</span></div>

        <div class="oauth">
          <button type="button" class="btn-outline"><span class="g">G</span> Google</button>
          <button type="button" class="btn-outline"> Apple</button>
        </div>
      </div>
    </section>
  </div>

  <script src="signup.js"></script>
  <script>
    
    const btn = document.getElementById("togglePassword");
    const input = document.getElementById("password");
    if (btn && input) {
      btn.addEventListener("click", () => {
        input.type = input.type === "password" ? "text" : "password";
      });
    }
  </script>
</body>
</html>
