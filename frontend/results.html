<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Reported Hazards | Project SAVE</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="page">
    <h1 class="pageTitle">Reported Hazards</h1>

    <div class="subTitle" id="filterInfo"></div>

    <div class="panel">
      <div id="msg" class="msg"></div>

      <div id="list" class="grid"></div>

      <div class="actions">
        <button class="btn light" id="changeFilterBtn">Change Filter</button>
        <button class="btn primary" id="backBtn">Back to Dashboard</button>
      </div>
    </div>
  </div>

  <!-- camera only input (hidden) -->
  <input id="cameraOnly" type="file" accept="image/*" capture="environment" style="display:none" />

  <script src="results.js"></script>
</body>
</html>
