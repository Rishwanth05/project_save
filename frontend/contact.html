<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Save</title>
  <link rel="stylesheet" href="contact.css" />
</head>

<body>
  <div class="contact-page">
    <div class="contact-card">

      <div class="top">
        <img class="logo" src="assets/logo.svg.svg" alt="Save Logo" />
        <h1>Contact Save</h1>
      </div>

      <div class="content">
        <!--  form -->
        <form id="contactForm" class="form">
          <input id="name" type="text" placeholder="Your Name" required />
          <input id="email" type="email" placeholder="Your Email" required />
          <input id="subject" type="text" placeholder="Subject" required />
          <textarea id="message" placeholder="Your Message" rows="5" required></textarea>

          <button type="submit" class="send-btn">Send Message</button>
          <p id="status" class="status"></p>
        </form>

        <!-- contact info -->
        <div class="info">
          <div class="info-row">
            <div class="icon-circle">📍</div>
            <div>
              <div class="label">Address:</div>
              <div class="value">Overland Park, Kansas</div>
            </div>
          </div>

          <div class="info-row">
            <div class="icon-circle">📞</div>
            <div>
              <div class="label">Phone:</div>
              <a class="value link" id="phoneLink" href="tel:+1XXXXXXXXXX">+1 (XXX) XXX-XXXX</a>
            </div>
          </div>

          <div class="info-row">
            <div class="icon-circle">✉️</div>
            <div>
              <div class="label">Email:</div>
              <a class="value link" id="emailLink" href="mailto:arishwanthreddy@gmail.com">arishwanthreddy@gmail.com</a>
            </div>
          </div>

          <div class="social">
            <a href="#" aria-label="Facebook">f</a>
            <a href="#" aria-label="Twitter">t</a>
            <a href="#" aria-label="Instagram">◎</a>
          </div>

          <a class="back" href="dashboard.html">← Back to Dashboard</a>
        </div>
      </div>
    </div>
  </div>

  <script src="contact.js"></script>
</body>
</html>
